AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: FinSight AI - Serverless Backend (Lambda + API Gateway)

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.11
    Environment:
      Variables:
        AWS_REGION_NAME: us-east-1
        BEDROCK_MODEL_ID: amazon.nova-lite-v1:0
        CORS_ORIGINS: "*"

Resources:
  FinSightFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: finsight-ai-backend
      Handler: lambda_handler.handler
      CodeUri: ../backend/
      Description: FinSight AI Backend - Avatar Wealth Advisor
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
            - Effect: Allow
              Action:
                - polly:SynthesizeSpeech
              Resource: "*"
            - Effect: Allow
              Action:
                - transcribe:StartTranscriptionJob
                - transcribe:GetTranscriptionJob
              Resource: "*"
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            ApiId: !Ref FinSightApi

  FinSightApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - "*"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${FinSightApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt FinSightFunction.Arn
